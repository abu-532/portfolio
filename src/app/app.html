<button class="to-top-btn" [class.visible]="showScroll()" [class.over-dark]="isOverDark()" (click)="scrollToTop()"
    aria-label="Scroll to top">
    <span class="to-top-text">TO TOP</span>
    <div class="to-top-line-container">
        <div class="to-top-line-fill" [style.height.%]="scrollProgress()"></div>
    </div>
</button>
